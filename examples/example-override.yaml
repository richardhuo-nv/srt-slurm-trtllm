# Example: Config Override
#
# A single YAML file defining a base config + multiple override variants.
# Each override only specifies the fields that differ from base — they are
# deep-merged at submission time, producing independent SLURM jobs.
#
# Usage:
#   srtctl apply -f example-override.yaml                       # Submit all 3 variants
#   srtctl apply -f example-override.yaml:base                  # Submit base only
#   srtctl apply -f example-override.yaml:override_tp64         # Submit tp64 variant only
#   srtctl dry-run -f example-override.yaml                     # Dry-run all variants
#   srtctl dry-run -f example-override.yaml:override_small      # Dry-run one variant

base:
  name: "disagg-fp8-benchmark"

  model:
    path: "deepseek-r1"
    container: "lmsysorg+sglang+v0.5.5.post2.sqsh"
    precision: "fp8"

  resources:
    gpu_type: "h100"
    gpus_per_node: 8
    prefill_nodes: 2
    prefill_workers: 2
    decode_nodes: 8
    decode_workers: 8

  backend:
    prefill_environment:
      TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    decode_environment:
      TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    sglang_config:
      prefill:
        served-model-name: "deepseek-ai/DeepSeek-R1"
        trust-remote-code: true
        tp-size: 8
      decode:
        served-model-name: "deepseek-ai/DeepSeek-R1"
        trust-remote-code: true
        tp-size: 8

  benchmark:
    type: "sa-bench"
    isl: 1024
    osl: 8192
    concurrencies: [8192, 10240]
    req_rate: "inf"

# --- Override variants ---

# Variant 1: Use TP=64 for both prefill and decode.
# Only the tp-size fields change; everything else is inherited from base.
override_tp64:
  backend:
    sglang_config:
      prefill:
        tp-size: 64
      decode:
        tp-size: 64

# Variant 2: Smaller cluster with fewer decode nodes and lower concurrency.
# Overrides resource allocation and benchmark parameters.
override_small:
  resources:
    decode_nodes: 4
    decode_workers: 4
  benchmark:
    concurrencies: [4096]
