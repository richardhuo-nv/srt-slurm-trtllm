# Example: Config Override
#
# A single YAML file defining a base config + multiple override variants.
# Supports two variant types:
#   override_*      — one variant, manually specified fields deep-merged with base
#   zip_override_*  — N variants, list-valued leaves zipped in parallel
#
# Usage:
#   srtctl apply -f example-override.yaml                            # Submit 5 variants: tp64 + small + tp_sweep_0/1/2 (base excluded)
#   srtctl apply -f example-override.yaml:base                       # Submit base only (explicit)
#   srtctl apply -f example-override.yaml:override_tp64              # Submit tp64 variant only
#   srtctl apply -f example-override.yaml:override_small             # Submit small variant only
#   srtctl apply -f example-override.yaml:zip_override_tp_sweep      # Submit all 3 tp_sweep variants (suffixes: tp_sweep_0, tp_sweep_1, tp_sweep_2)
#   srtctl apply -f example-override.yaml:zip_override_tp_sweep[0]   # Submit tp_sweep_0 (job name: disagg-fp8-benchmark-tp16)
#   srtctl dry-run -f example-override.yaml                          # Dry-run all 5 variants

base:
  name: "disagg-fp8-benchmark"

  model:
    path: "deepseek-r1"
    container: "lmsysorg+sglang+v0.5.5.post2.sqsh"
    precision: "fp8"

  resources:
    gpu_type: "h100"
    gpus_per_node: 8
    prefill_nodes: 2
    prefill_workers: 2
    decode_nodes: 8
    decode_workers: 8

  backend:
    prefill_environment:
      TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    decode_environment:
      TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    sglang_config:
      prefill:
        served-model-name: "deepseek-ai/DeepSeek-R1"
        trust-remote-code: true
        tp-size: 8
      decode:
        served-model-name: "deepseek-ai/DeepSeek-R1"
        trust-remote-code: true
        tp-size: 8

  benchmark:
    type: "sa-bench"
    isl: 1024
    osl: 8192
    concurrencies: [8192, 10240]
    req_rate: "inf"


# =============================================================================
# override_* variants — one job each, deep-merged with base
# =============================================================================

# Variant: Use TP=64 for both prefill and decode.
# Only the tp-size fields change; everything else is inherited from base.
override_tp64:
  backend:
    sglang_config:
      prefill:
        tp-size: 64
      decode:
        tp-size: 64

# Variant: Smaller cluster with fewer decode nodes and lower concurrency.
override_small:
  resources:
    decode_nodes: 4
    decode_workers: 4
  benchmark:
    concurrencies: [4096]


# =============================================================================
# zip_override_* variants — N jobs, list leaves zipped in parallel
#
# Rules:
#   list leaf          → zip dimension (each variant gets the i-th element)
#   length-1 list      → broadcast (same value for every variant)
#   list-of-list leaf  → literal list value per variant
#   scalar leaf        → broadcast unchanged
#   name list          → explicit names; omit for auto-naming ({base}_{group}_{i})
# =============================================================================

# Sweep across 3 TP configurations.
# Generates 3 jobs with suffixes tp_sweep_0, tp_sweep_1, tp_sweep_2.
# Each variant gets an explicit job name from the name list below.
zip_override_tp_sweep:
  name:
    - "disagg-fp8-benchmark-tp16"
    - "disagg-fp8-benchmark-tp32"
    - "disagg-fp8-benchmark-tp64"
  resources:
    # Each TP config needs a different node count for prefill.
    prefill_nodes: [1, 2, 4]
    prefill_workers: [1, 2, 4]
    decode_nodes: [4, 8, 16]
    decode_workers: [4, 8, 16]
  backend:
    sglang_config:
      prefill:
        tp-size: [16, 32, 64]
      decode:
        tp-size: [16, 32, 64]
        # length-1 → broadcast: same mem fraction for all 3 variants
        mem-fraction-static: [0.85]
  benchmark:
    # list-of-list → each variant gets a literal list as its concurrencies
    concurrencies: [[4096, 8192], [4096, 8192, 10240], [8192, 10240, 12288]]
