name: "1ctx_dep4_1gen_dep4_conc512"

model:
  path: "/lustre/fsw/core_dlfw_ci/rihuo/nvidia_Qwen3.5-397B-A17B-NVFP4"
  container: "/lustre/fsw/core_dlfw_ci/rihuo/dynamo-trtllm-arm64-48799748.sqsh"
  precision: "fp4"

resources:
  gpu_type: "gb300"
  prefill_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  decode_nodes: 1
  gpus_per_node: 4

backend:
  type: trtllm

  prefill_environment:
    TLLM_LOG_LEVEL: "INFO"
  decode_environment:
    TLLM_LOG_LEVEL: "INFO"

  trtllm_config:
    prefill:
      max_batch_size: 128
      max_num_tokens: 16384
      max_seq_len: 1227
      tensor_parallel_size: 4
      moe_expert_parallel_size: 4
      enable_attention_dp: true
      pipeline_parallel_size: 1
      print_iter_log: true
      enable_iter_perf_stats: true
      cuda_graph_config: null
      disable_overlap_scheduler: true
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.85
        dtype: fp8
      moe_config:
        backend: CUTEDSL
      nvfp4_gemm_config:
        allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
      cache_transceiver_config:
        max_tokens_in_buffer: 4608
        backend: UCX
      scheduler_config:
        capacity_scheduler_policy: MAX_UTILIZATION
        context_chunking_policy: FIRST_COME_FIRST_SERVED

    decode:
      tensor_parallel_size: 4
      moe_expert_parallel_size: 4
      enable_attention_dp: true
      enable_lm_head_tp_in_adp: false
      pipeline_parallel_size: 1
      max_batch_size: 256
      max_num_tokens: 16384
      max_seq_len: 2251
      cuda_graph_config:
        enable_padding: true
        batch_sizes:
        - 1
        - 2
        - 4
        - 8
        - 16
        - 20
        - 24
        - 32
        - 64
        - 128
        - 256
        - 384
        - 512
      print_iter_log: true
      enable_iter_perf_stats: true
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.9
        dtype: fp8
      moe_config:
        backend: CUTEDSL
        use_low_precision_moe_combine: true
      nvfp4_gemm_config:
        allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
      cache_transceiver_config:
        max_tokens_in_buffer: 4608
        backend: UCX
      stream_interval: 100
      num_postprocess_workers: 4
      scheduler_config:
        capacity_scheduler_policy: MAX_UTILIZATION
        context_chunking_policy: FIRST_COME_FIRST_SERVED

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "512"
  req_rate: "inf"
  num_prompts_mult: 8

frontend:
  type: "dynamo"
  enable_multiple_frontends: true
  nginx_container: "/lustre/fsw/core_dlfw_ci/rihuo/nginx.sqsh"

dynamo:
  install: false
