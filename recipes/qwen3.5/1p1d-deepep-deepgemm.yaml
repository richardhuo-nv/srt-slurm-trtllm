# Qwen3.5-397B-A17B-FP8 1P1D: Prefill TP4 (1 node) + Decode DeepEP TP8/EP8 (2 nodes)
# Total 3 nodes: prefill simple, decode wide-EP with low_latency
# Performance is un-verified. Accuracy testing in progress.
# Purpose: accuracy verification (not for pareto benchmarking)

name: "qwen3.5-1p1d-deepep-deepgemm"

model:
  path: "qwen3.5-fp8"
  container: "dev"  # docker://lmsysorg/sglang:dev
  precision: "fp8"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  # Prefill: 1 node TP4 (no EP), Decode: 2 nodes TP8/EP8
  prefill_nodes: 1
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1

backend:

  prefill_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    MC_FORCE_MNNVL: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  decode_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    MC_FORCE_MNNVL: "1"
    MC_TE_METRIC: "true"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: "1000"
    SGLANG_HACK_SEQ_BOOTSTRAP_ROOM: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  sglang_config:
    prefill:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"
      trust-remote-code: true

      # Parallelism: simple TP4 on 1 node, no EP
      tensor-parallel-size: 4
      data-parallel-size: 1
      expert-parallel-size: 1

      # Mamba hybrid model settings
      mamba-scheduler-strategy: "extra_buffer"
      mamba-track-interval: 2048
      mamba-ssm-dtype: "bfloat16"

      # PD disaggregation
      disaggregation-mode: "prefill"
      disable-radix-cache: true

      # Memory: same as AGG/1p1d configs
      mem-fraction-static: 0.75
      chunked-prefill-size: 16384
      context-length: 2020

      # Tell prefill about decode's actual TP/DP sizes for correct KV transfer
      disaggregation-decode-tp: 8
      disaggregation-decode-dp: 8

      load-balance-method: "round_robin"
      watchdog-timeout: 1000000
      disable-cuda-graph: true

    decode:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"
      trust-remote-code: true

      # Parallelism: TP8/EP8 across 2 GB200 nodes
      tp-size: 8
      dp-size: 8
      ep-size: 8
      enable-dp-attention: true

      # Mamba hybrid model settings
      mamba-scheduler-strategy: "extra_buffer"
      mamba-track-interval: 2048
      mamba-ssm-dtype: "bfloat16"

      # PD disaggregation
      disaggregation-mode: "decode"
      disable-radix-cache: true
      disaggregation-bootstrap-port: 30001

      # Memory + mamba 3x pool
      # With dp_size=8 + enable_dp_attention, code divides by dp_size:
      #   max_mamba_cache_size: 3200/8 = 400 per DP worker
      #   max_running_requests: 640/8 = 80 per DP worker
      #   extra_buffer needs 3 slots/req: 3*80 = 240, pool=400 → 67% headroom
      #   Reduced from 800 to 640 to avoid token pool exhaustion triggering retraction
      mem-fraction-static: 0.60

      max-mamba-cache-size: 3200
      max-running-requests: 640
      chunked-prefill-size: 16384
      context-length: 2020
      cuda-graph-max-bs: 128
      watchdog-timeout: 1000000

      # DeepEP: low_latency for decode (requires rebuilt DeepEP with kNumMaxTopK=16)
      moe-a2a-backend: "deepep"
      deepep-mode: "low_latency"
      ep-dispatch-algorithm: "static"
      moe-dense-tp-size: 1
      enable-dp-lm-head: true
      prefill-round-robin-balance: true

      # DeepGemm for MoE GEMM
      moe-runner-backend: "deep_gemm"

      # Workload balance
      eplb-algorithm: "deepseek"

benchmark:
  type: "gpqa"
  num_examples: 198
  max_tokens: 65536
  repeat: 8
  num_threads: 128
